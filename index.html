<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Dashmetry</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #unity-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      z-index: 20;
    }

    .loading-box {
      width: min(420px, 82vw);
      text-align: center;
    }

    .loading-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }

    .loading-text {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 14px;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: #ffffff;
      transition: width 0.15s linear;
    }

    .loading-percent {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.85;
    }

    #error-box {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      max-width: min(700px, 92vw);
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(180, 0, 0, 0.92);
      color: #fff;
      font-size: 14px;
      line-height: 1.4;
      display: none;
      z-index: 30;
      box-sizing: border-box;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <div id="loading-screen">
    <div class="loading-box">
      <div class="loading-title">Dashmetry</div>
      <div class="loading-text" id="loading-text">Loading game...</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="loading-percent" id="loading-percent">0%</div>
    </div>
  </div>

  <div id="error-box"></div>

  <script>
    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/dashmetry-v26021502.loader.js";

    const config = {
      dataUrl: buildUrl + "/dashmetry-v26021502.data.unityweb",
      frameworkUrl: buildUrl + "/dashmetry-v26021502.framework.js.unityweb",
      codeUrl: buildUrl + "/dashmetry-v26021502.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Unknown",
      productName: "Dashmetry",
      productVersion: "26021502"
    };

    const canvas = document.getElementById("unity-canvas");
    const loadingScreen = document.getElementById("loading-screen");
    const loadingText = document.getElementById("loading-text");
    const progressFill = document.getElementById("progress-fill");
    const progressPercent = document.getElementById("loading-percent");
    const errorBox = document.getElementById("error-box");

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
    }

    const script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = function () {
      createUnityInstance(canvas, config, function (progress) {
        const percent = Math.round(progress * 100);
        progressFill.style.width = percent + "%";
        progressPercent.textContent = percent + "%";
        loadingText.textContent = percent >= 100 ? "Starting game..." : "Loading game...";
      }).then(function (unityInstance) {
        window.unityInstance = unityInstance;
        loadingScreen.style.display = "none";
        canvas.focus();
      }).catch(function (message) {
        showError("Failed to load Unity:\n" + message);
      });
    };

    script.onerror = function () {
      showError("Could not load the Unity loader file:\n" + loaderUrl);
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
